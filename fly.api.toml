# Fly.io configuration for LicenseBox API
# Deploy with: fly deploy -c fly.api.toml
# https://fly.io/docs/reference/configuration/

app = 'licensebox-api'
primary_region = 'dfw'

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[deploy]
  release_command = "/app/migrate.sh"
