version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: licensebox-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: licensebox
      POSTGRES_PASSWORD: licensebox_dev
      POSTGRES_DB: licensebox_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U licensebox"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
